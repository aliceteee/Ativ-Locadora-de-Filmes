<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>MovieStation - Cadastro de Filmes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="hero small">
        <h1>Cadastro de Filmes</h1>
        <nav>
            <a href="index.html">Home</a>
        </nav>
    </header>

    <main>
        <button onclick="abrirModal()">Novo Filme</button>

        <div id="modal" class="modal">
            <div class="modal-content">
                <span onclick="fecharModal()" class="close">&times;</span>
                <h2>Cadastrar Filme</h2>

                <label>Capa do Filme:</label>
                <input type="text" id="capa" placeholder="Cole aqui o link da imagem"><br>

                <label>Nome:</label>
                <input type="text" id="nome"><br>

                <label>Gênero:</label>
                <select id="genero">
                    <option>Ação</option>
                    <option>Comédia</option>
                    <option>Drama</option>
                    <option>Terror</option>
                    <option>Romance</option>
                </select><br>

                <label>Ano:</label>
                <input type="number" id="ano"><br>

                <label>Classificação:</label>
                <select id="classificacao">
                    <option>Livre</option>
                    <option>10 anos</option>
                    <option>12 anos</option>
                    <option>14 anos</option>
                    <option>16 anos</option>
                    <option>18 anos</option>
                </select><br>

                <label>Produtora:</label>
                <input type="text" id="produtora"><br>

                <button onclick="salvarFilme()">Salvar</button>
            </div>
        </div>

        <h2>Filmes Cadastrados</h2>
        <table>
            <thead>
                <tr>
                    <th>Capa</th>
                    <th>Nome</th>
                    <th>Gênero</th>
                    <th>Ano</th>
                    <th>Classificação</th>
                    <th>Produtora</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="dados"></tbody>
        </table>
    </main>

    <footer>
        <p>&copy; 2026 MovieStation</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
